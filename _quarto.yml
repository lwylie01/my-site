project:
  type: website
  output-dir: _site
  # Regenerates the interactive HTML pages from their editable Excel files on
  # every render/publish. Edit the .xlsx files to update them.
  #   hiphop/data/hiphop_artists.xlsx   -> hiphop/hiphop_periodic_table.html
  #   barnum/data/barnum_statements.xlsx -> barnum/barnum_test.html
  pre-render:
    - hiphop/build_table.R
    - barnum/build_barnum.R
  resources:
    - hiphop/hiphop_periodic_table.html
    - hiphop/data/hiphop_artists.xlsx
    - barnum/barnum_test.html
    - barnum/data/barnum_statements.xlsx
    - "CV/Wylie CV 8.2025.pdf"
    - CNAME

website:
  title: "Data with a Plot"
  description: "Lindsey E. Wylie, J.D., Ph.D."
  favicon: favicon.svg
  site-url: https://datawithaplot.org

  navbar:
    logo: pics/logoW-clear.png
    logo-alt: "Data with a Plot"
    title: false
    left:
      - href: index.qmd
        text: Home
      - href: projects/index.qmd
        text: Projects
      - href: teaching/index.qmd
        text: Teaching
      - href: writing/index.qmd
        text: Writing
    right:
      - icon: github
        href: https://github.com/lwylie01
        aria-label: GitHub
      - icon: linkedin
        href: https://linkedin.com/in/lindsey-wylie-jd-phd-8a06342a/
        aria-label: LinkedIn

  sidebar: true

  page-footer:
    left: "© 2026 Wylie Insights"
    right:
      - icon: github
        href: https://github.com/lwylie01
      - icon: linkedin
        href: https://linkedin.com/in/lindsey-wylie-jd-phd-8a06342a/

  open-graph: true
  twitter-card: false

format:
  html:
    theme:
      - cosmo
      - site-theme.scss
    toc: false
    link-external-icon: false
    link-external-newwindow: true
    smooth-scroll: true
    code-fold: true
    code-tools: false

execute:
  freeze: auto
  echo: false
  warning: false
  message: false
