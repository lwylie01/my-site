project:
  type: website
  output-dir: _site
  # The CV/ capacity dashboard is a personal planning tool — never render it
  # into the public site (its .qmd is also gitignored so CI never sees it).
  render:
    - "*.qmd"
    - "**/*.qmd"
    - "!CV/Wylie_Capacity_Dashboard.qmd"
  # Regenerates the interactive HTML pages from their editable Excel files on
  # every render/publish. Edit the .xlsx files to update them.
  #   hiphop/data/hiphop_artists.xlsx    -> hiphop/hiphop_periodic_table.html
  #   barnum/data/barnum_statements.xlsx -> barnum/barnum_test.html
  #   howold/data/howold_items.xlsx      -> howold/how_old_is_old.html
  #   gut/data/gut_cases.xlsx            -> gut/trust_your_gut.html
  #   evalpicker/data/evaluation_approaches.xlsx -> evalpicker/eval_picker.html
  #   formatpicker/data/delivery_formats.xlsx    -> formatpicker/format_picker.html
  # Every generated page needs a build script here AND a resources entry below,
  # or it silently stops being published. Keep both lists in sync when merging.
  pre-render:
    - hiphop/build_table.R
    - barnum/build_barnum.R
    - howold/build_howold.R
    - gut/build_gut.R
    - evalpicker/build_eval.R
    - formatpicker/build_format.R
  resources:
    - hiphop/hiphop_periodic_table.html
    - hiphop/data/hiphop_artists.xlsx
    - barnum/barnum_test.html
    - barnum/data/barnum_statements.xlsx
    - howold/how_old_is_old.html
    - howold/data/howold_items.xlsx
    - gut/trust_your_gut.html
    - gut/data/gut_cases.xlsx
    - evalpicker/eval_picker.html
    - evalpicker/data/evaluation_approaches.xlsx
    - formatpicker/format_picker.html
    - formatpicker/data/delivery_formats.xlsx
    - "CV/Wylie CV 7.2026.pdf"
    - CNAME

